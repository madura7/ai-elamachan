openapi: 3.1.0

info:
  title: ElaMachan API
  version: 1.0.0
  description: |
    Single source of truth for the ElaMachan (trilingual Sri Lankan classifieds)
    HTTP contract, per **ADR 0003**. Both the Next.js frontend and the Go backend
    derive from this file:

    - **Frontend** generates a typed TS client/types from this spec
      (`openapi-typescript` + `openapi-fetch`) — no hand-written request types.
    - **Backend** treats this file as the authoritative contract; request/response
      shapes must match it.

    Conventions locked here (do not change without a contract change → **Board
    escalation** per the merge policy):

    - **Versioning:** every endpoint lives under `/api/v1` (the `servers` base).
    - **Error envelope:** all non-2xx responses use `{ "error": { "code", "message" } }`.
    - **Trilingual content:** user/taxonomy text carries `en` / `si` / `ta`
      variants (ADR 0001); the seller authors in one `content_language`.
    - **Auth:** phone + OTP primary (ADR 0002); protected endpoints take a bearer
      session token.

    Status of this v1 surface: `POST /listings/ai-draft` is **implemented**
    (VER-58). The remaining paths (auth, listings, categories, search) are
    **stubs** that lock the shape; each is finalized by its own feature issue and
    is marked `x-status: stub` below.

servers:
  - url: /api/v1
    description: Version 1. Relative to the deployed host (locked `/api/v1` prefix).

tags:
  - name: ai-assist
    description: AI-assisted listing drafting (Claude). Draft only — never an action.
  - name: auth
    description: Phone + OTP authentication (ADR 0002). Stub.
  - name: listings
    description: Classified listings CRUD. Stub.
  - name: categories
    description: Localized category taxonomy (ADR 0001). Stub.
  - name: search
    description: Listing search (Meilisearch-backed). Stub.
  - name: inquiries
    description: Buyer→seller inquiry contact path (VER-295 M1).

paths:
  /listings/ai-draft:
    post:
      tags: [ai-assist]
      operationId: createListingAiDraft
      summary: Generate an AI-assisted listing draft
      description: |
        Generate a **draft** listing (trilingual title + description + a suggested
        category) from a seller-supplied photo and/or keywords. Implemented in
        VER-58.

        This endpoint returns a draft only — it **never creates, prices, or
        publishes** a listing. The seller reviews/edits the draft and then submits
        a separate, authenticated `POST /listings`. Keywords and image contents
        are treated as untrusted data (prompt-injection safe).

        Rate limited per caller. Requires the AI-assist key to be provisioned on
        the server; otherwise responds `503 ai_assist_unavailable`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                keywords:
                  type: string
                  maxLength: 2000
                  description: |
                    Optional free-text keywords describing the item (≤ 2 KB).
                    Treated as untrusted data, never instructions.
                image:
                  type: string
                  format: binary
                  description: |
                    Optional product photo (≤ 5 MiB; jpeg, png, webp, or gif).
                    Resize to ~1000px long edge client-side before upload.
              # At least one of keywords/image must be present; an empty request
              # is rejected with 400 empty_request.
            encoding:
              image:
                contentType: image/jpeg, image/png, image/webp, image/gif
      responses:
        "200":
          description: A generated draft listing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDraft"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          description: Keywords or image exceed the size limit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "415":
          description: Unsupported image media type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          description: Upstream AI provider failed to produce a draft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: AI-assist is not configured / spend cap reached on this server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/otp/request:
    post:
      tags: [auth]
      operationId: requestOtp
      summary: Request an OTP challenge for a phone number
      x-status: stub
      description: |
        **Stub** — finalized by the auth implementation issue (Board-escalation,
        ADR 0002). Sends a one-time code to the given phone number and returns a
        challenge handle. Rate limited per phone and per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
      responses:
        "202":
          description: OTP dispatched (or accepted for dispatch).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpChallenge"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/otp/verify:
    post:
      tags: [auth]
      operationId: verifyOtp
      summary: Verify an OTP code and start a session
      x-status: stub
      description: |
        **Stub** — finalized by the auth implementation issue. Verifies the code
        for a challenge and, on success, returns a bearer session token and the
        authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerify"
      responses:
        "200":
          description: Verified; session established.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /categories:
    get:
      tags: [categories]
      operationId: listCategories
      summary: List the localized category taxonomy
      x-status: stub
      description: |
        **Stub** — finalized by the taxonomy issue (ADR 0001). Returns the
        category tree with names resolved to the requested language via the
        `requested → en → any` fallback chain.
      parameters:
        - $ref: "#/components/parameters/LangQuery"
      responses:
        "200":
          description: The category list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /listings:
    get:
      tags: [listings]
      operationId: listListings
      summary: List published listings
      description: "Paginated browse/filter. Pass mine=true (auth required) to return only the caller's listings."
      parameters:
        - $ref: "#/components/parameters/LangQuery"
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CategorySlug"
        - name: mine
          in: query
          required: false
          description: "When true, return only the authenticated caller's listings. Requires a valid bearer token."
          schema:
            type: boolean
            default: false
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PageSizeQuery"
      responses:
        "200":
          description: A page of listing summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [listings]
      operationId: createListing
      summary: Create a listing
      description: |
        Creates a listing authored in a single `content_language`. Requires authentication.
        A draft from `/listings/ai-draft` is never auto-created; the seller submits here.
        A PostingPolicy is evaluated first; exceeding the daily cap returns 403.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingCreate"
      responses:
        "201":
          description: Listing created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Posting denied by policy (e.g. daily cap exceeded).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostingDenied"

  /listings/{id}:
    get:
      tags: [listings]
      operationId: getListing
      summary: Get a single listing
      description: "Returns one listing with title/description resolved to the requested language (ADR 0001 fallback)."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/LangQuery"
      responses:
        "200":
          description: The listing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [listings]
      operationId: updateListing
      summary: Update a listing
      description: |
        Edits the caller's own listing. Requires authentication and ownership:
        non-owners get 403, an unknown listing gets 404. `content_language` is
        immutable, so title/description edits land on the listing's existing
        authored-language translation.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingUpdate"
      responses:
        "200":
          description: Listing updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [listings]
      operationId: deleteListing
      summary: Delete a listing
      description: |
        Removes the caller's own listing (soft delete; it leaves the catalog and
        dashboard). Requires authentication and ownership: non-owners get 403, an
        unknown listing gets 404.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Listing deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /listings/{listingId}/inquiries:
    post:
      tags: [inquiries]
      operationId: createInquiry
      summary: Submit a buyer inquiry about a listing
      description: |
        Creates a buyer→seller inquiry message for the given listing.
        Requires authentication. Returns 422 when the caller owns the listing
        (own-listing guard) or when the message is blank / exceeds 1000 chars.
        On first contact for a (buyer, listing) pair, emits a connection-event
        metric (North-Star). Repeat inquiries on the same listing do NOT emit
        a second event.
      security:
        - bearerAuth: []
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryCreate"
      responses:
        "201":
          description: Inquiry created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Validation failed (own listing, blank message, or message too long).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /inquiries:
    get:
      tags: [inquiries]
      operationId: listSellerInquiries
      summary: Seller inbox — inquiries across the caller's listings
      description: |
        Returns inquiries on listings owned by the authenticated caller, newest
        first. `buyer_label` is the buyer's display name if present, else a
        stable pseudonymous label (e.g. `Buyer-7F3A`). Phone and email are
        never included. Optional `?listing_id=` filter narrows to one listing.
      security:
        - bearerAuth: []
      parameters:
        - name: listing_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Optional filter — return inquiries for this listing only.
      responses:
        "200":
          description: List of seller inquiries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SellerInquiry"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /inquiries/{inquiryId}:
    get:
      tags: [inquiries]
      operationId: getInquiryThread
      summary: Get full inquiry thread (header + messages)
      description: |
        Returns the full conversation thread for an inquiry. Participant-only
        (buyer or seller). When the seller opens a `new` inquiry the status
        transitions to `read`; it is never downgraded from `replied`.
      security:
        - bearerAuth: []
      parameters:
        - name: inquiryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Thread with messages oldest-first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryThread"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /inquiries/{inquiryId}/messages:
    post:
      tags: [inquiries]
      operationId: postInquiryMessage
      summary: Reply in an inquiry thread
      description: |
        Adds a new message to an inquiry thread. Participant-only; `sender_role`
        is derived from the authenticated user. A seller reply transitions the
        inquiry status to `replied`. Rate limited: 5/min + 60/hr per user.
      security:
        - bearerAuth: []
      parameters:
        - name: inquiryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageCreate"
      responses:
        "201":
          description: Message created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Validation failed (blank body or body too long).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"

  /inquiries/{inquiryId}/report:
    post:
      tags: [inquiries]
      operationId: reportInquiry
      summary: Report an inquiry for abuse
      description: |
        Submits an abuse report for an inquiry. Participant-only. Returns 204
        on success. Rate limited: 5/min + 60/hr per user.
      security:
        - bearerAuth: []
      parameters:
        - name: inquiryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryReportCreate"
      responses:
        "204":
          description: Report recorded.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Validation failed (blank or too-long reason).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"

  /search:
    get:
      tags: [search]
      operationId: searchListings
      summary: Search listings
      x-status: stub
      description: |
        **Stub** — finalized by the search issue (Meilisearch). Full-text search
        over localized listing fields with optional category filter.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: The search query.
        - $ref: "#/components/parameters/LangQuery"
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CategorySlug"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PageSizeQuery"
      responses:
        "200":
          description: Search results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingPage"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Session token issued by `POST /auth/otp/verify` (ADR 0002). The exact
        token format (signed JWT vs opaque session) is finalized in the auth
        implementation task.

  parameters:
    LangQuery:
      name: lang
      in: query
      required: false
      description: "Preferred response language; falls back `requested → en → any` (ADR 0001)."
      schema:
        $ref: "#/components/schemas/Lang"
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeQuery:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: The request was malformed or failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication is required or failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated, but not permitted to act on this resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Too many requests; slow down.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      description: |
        Canonical error envelope (ADR 0003). EVERY non-2xx response uses this
        shape. `code` is a stable, machine-readable slug (e.g. `rate_limited`,
        `ai_assist_unavailable`); `message` is human-readable and may change.
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable machine-readable error code.
            message:
              type: string
              description: Human-readable description (not for branching on).
      additionalProperties: false

    Lang:
      type: string
      description: Supported content/UI language (ADR 0001).
      enum: [en, si, ta]

    Trilingual:
      type: object
      description: A text value in English, Sinhala, and Tamil (ADR 0001).
      required: [en, si, ta]
      properties:
        en:
          type: string
        si:
          type: string
        ta:
          type: string
      additionalProperties: false

    CategorySlug:
      type: string
      description: |
        Closed category taxonomy slug. Single source of truth is the backend
        `Categories` set (server-re-validated on AI drafts). Extended via the
        taxonomy issue, not ad hoc.
      enum:
        - electronics
        - vehicles
        - property
        - home_garden
        - fashion
        - mobile_phones
        - services
        - jobs
        - pets
        - other

    ListingDraft:
      type: object
      description: |
        AI-generated draft listing returned by `POST /listings/ai-draft`. Note
        what is deliberately ABSENT: price, publish, featured, urgent — the model
        has no field to escalate into. The draft is editor input only.
      required: [category_suggestion, title, description, needs_human_review]
      properties:
        category_suggestion:
          $ref: "#/components/schemas/CategorySlug"
        title:
          $ref: "#/components/schemas/Trilingual"
        description:
          $ref: "#/components/schemas/Trilingual"
        needs_human_review:
          type: boolean
          description: |
            True when the model could not confidently draft (unreadable/off-topic
            photo, or a category that failed server-side re-validation).
        review_note:
          type: string
          description: Brief reviewer-facing note; present when needs_human_review is true.
      additionalProperties: false

    OtpRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          description: Phone number; normalized to E.164 server-side (ADR 0002).
          example: "+94771234567"
        purpose:
          type: string
          enum: [signup, login]
          default: login
      additionalProperties: false

    OtpChallenge:
      type: object
      required: [challenge_id, expires_at]
      properties:
        challenge_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
      additionalProperties: false

    OtpVerify:
      type: object
      required: [challenge_id, code]
      properties:
        challenge_id:
          type: string
          format: uuid
        code:
          type: string
          description: The OTP code the user received.
      additionalProperties: false

    Session:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: Bearer session token (see bearerAuth).
        expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"
      additionalProperties: false

    User:
      type: object
      required: [id, display_name, preferred_language]
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: [string, "null"]
          description: E.164 phone number (nullable for future email-only users).
        display_name:
          type: string
        preferred_language:
          $ref: "#/components/schemas/Lang"
      additionalProperties: false

    Category:
      type: object
      description: A taxonomy category with its name resolved to the requested language.
      required: [slug, name]
      properties:
        slug:
          $ref: "#/components/schemas/CategorySlug"
        name:
          type: string
          description: Localized display name (fallback-resolved).
        parent_slug:
          type: [string, "null"]
        sort_order:
          type: integer
      additionalProperties: false

    PostingDenied:
      type: object
      description: Returned with 403 when a PostingPolicy rejects the create request.
      required: [code, message, retry_after]
      properties:
        code:
          type: string
          description: Stable machine-readable denial code (e.g. posting_limit_exceeded).
        message:
          type: string
          description: Human-readable reason.
        retry_after:
          type: integer
          format: int64
          description: Unix timestamp (seconds) after which the caller may retry. 0 when not applicable.
      additionalProperties: false

    ListingCreate:
      type: object
      required: [category, content_language, title, description]
      properties:
        category:
          $ref: "#/components/schemas/CategorySlug"
        content_language:
          $ref: "#/components/schemas/Lang"
        title:
          type: string
          description: Authored in the single content_language.
        description:
          type: string
        price_lkr:
          type: [integer, "null"]
          description: Optional asking price in LKR. Set by the seller, never by AI.
      additionalProperties: false

    ListingUpdate:
      type: object
      description: |
        Body for PUT /listings/{id}. Mirrors ListingCreate minus content_language,
        which is immutable after creation — title/description edits apply to the
        listing's existing authored-language translation.
      required: [category, title, description]
      properties:
        category:
          $ref: "#/components/schemas/CategorySlug"
        title:
          type: string
        description:
          type: string
        price_lkr:
          type: [integer, "null"]
          description: Optional asking price in LKR. Set by the seller, never by AI.
      additionalProperties: false

    Listing:
      type: object
      description: |
        A published listing. Title/description are returned resolved to the
        requested language (with machine-translation fallback per ADR 0001).
      required: [id, category, content_language, title, description, created_at]
      properties:
        id:
          type: string
          format: uuid
        category:
          $ref: "#/components/schemas/CategorySlug"
        content_language:
          $ref: "#/components/schemas/Lang"
        title:
          type: string
        description:
          type: string
        price_lkr:
          type: [integer, "null"]
        translation_source:
          type: [string, "null"]
          enum: [human, machine, null]
          description: Source of the returned localized text (ADR 0001).
        created_at:
          type: string
          format: date-time
      additionalProperties: false

    ListingSummary:
      type: object
      required: [id, category, title, created_at]
      properties:
        id:
          type: string
          format: uuid
        category:
          $ref: "#/components/schemas/CategorySlug"
        title:
          type: string
        price_lkr:
          type: [integer, "null"]
        thumbnail_url:
          type: [string, "null"]
          format: uri
          description: URL of the listing's primary thumbnail image, or null if none.
        created_at:
          type: string
          format: date-time
      additionalProperties: false

    ListingPage:
      type: object
      description: A page of listing summaries.
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ListingSummary"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
          description: Total matching listings across all pages.
        facets:
          type: object
          description: Category facet counts returned by search endpoints (absent on listing-only endpoints).
          additionalProperties:
            type: integer
      additionalProperties: false

    InquiryCreate:
      type: object
      description: Request body for POST /listings/{listingId}/inquiries.
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 1000
          description: The buyer's message to the seller (1–1000 chars, non-blank).
      additionalProperties: false

    Inquiry:
      type: object
      description: |
        Response for a created inquiry. Intentionally omits seller PII
        (phone, email, display_name).
      required: [id, listing_id, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [new, read, replied]
        created_at:
          type: string
          format: date-time
      additionalProperties: false

    SellerInquiry:
      type: object
      description: |
        One inbox entry in the seller's inquiry view. `buyer_label` is the
        buyer's display name when available, else a stable pseudonym derived
        from a hash of the buyer id (e.g. `Buyer-7F3A`). Phone and email are
        never included.
      required: [id, listing_id, listing_title, buyer_label, message, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        listing_title:
          type: string
        buyer_label:
          type: string
          description: Buyer display name if known, else a stable pseudonym. Never phone/email.
        message:
          type: string
        status:
          type: string
          enum: [new, read, replied]
        created_at:
          type: string
          format: date-time
      additionalProperties: false

    InquiryMessage:
      type: object
      description: A single message turn in an inquiry thread (buyer or seller).
      required: [id, inquiry_id, sender_role, body, created_at]
      properties:
        id:
          type: string
          format: uuid
        inquiry_id:
          type: string
          format: uuid
        sender_role:
          type: string
          enum: [buyer, seller]
        body:
          type: string
        created_at:
          type: string
          format: date-time
      additionalProperties: false

    InquiryThread:
      type: object
      description: |
        Full thread for an inquiry: header fields (same as SellerInquiry) plus
        the ordered list of messages. Returned by GET /inquiries/{inquiryId}.
      required: [id, listing_id, listing_title, buyer_label, status, created_at, messages]
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        listing_title:
          type: string
        buyer_label:
          type: string
          description: Buyer display name if known, else a stable pseudonym.
        status:
          type: string
          enum: [new, read, replied]
        created_at:
          type: string
          format: date-time
        messages:
          type: array
          description: Messages in chronological order (oldest first).
          items:
            $ref: "#/components/schemas/InquiryMessage"
      additionalProperties: false

    MessageCreate:
      type: object
      description: Request body for POST /inquiries/{inquiryId}/messages.
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 1000
          description: The reply text (1–1000 chars, non-blank).
      additionalProperties: false

    InquiryReportCreate:
      type: object
      description: Request body for POST /inquiries/{inquiryId}/report.
      required: [reason]
      properties:
        reason:
          type: string
          maxLength: 500
          description: Short description of the reported content (≤500 chars).
      additionalProperties: false
